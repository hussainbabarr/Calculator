name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17


      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip wget \
            autoconf automake libtool pkg-config \
            cmake libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev libncursesw5-dev


      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.37


      - name: Prime buildozer (let it download its own SDK/NDK)
        run: |
          # This first run is EXPECTED to fail — it just makes buildozer
          # download Java tools, the Android SDK cmdline-tools, and the NDK
          # into ~/.buildozer/android/platform/. It will stop once it hits
          # the license prompt, which is fine.
          buildozer android debug || true


      - name: Accept Android SDK licenses
        run: |
          SDKMANAGER=$(find $HOME/.buildozer/android/platform/android-sdk -type f -name sdkmanager | head -n 1)
          echo "Using sdkmanager at: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses || true


      - name: Build APK
        run: |
          buildozer android debug


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-apk
          path: bin/*.apk