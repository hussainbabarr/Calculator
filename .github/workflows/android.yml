name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            wget \
            autoconf \
            automake \
            libtool \
            pkg-config \
            cmake \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer
          pip install "cython==0.29.37"

      - name: Pre-stage legacy Android SDK
        shell: bash
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"

          rm -rf "$SDK_DIR"
          mkdir -p "$HOME/.buildozer/android/platform"
          cd "$HOME/.buildozer/android/platform"

          wget -q \
            "https://dl.google.com/android/repository/sdk-tools-linux-4333796.zip" \
            -O sdk-tools.zip

          mkdir -p android-sdk
          unzip -q sdk-tools.zip -d android-sdk
          rm -f sdk-tools.zip

          mkdir -p "$SDK_DIR/licenses"

          printf '%s\n' \
            "8933bad161af4178b1185d1a37fbf41ea5269c55" \
            "d56f5187479451eabf01fb78af6dfcb131a6481e" \
            "24333f8a63b6825ea9c5514f83c2829b004d1fee" \
            > "$SDK_DIR/licenses/android-sdk-license"

          printf '%s\n' \
            "84831b9409646a918e30573bab4c9c91346d8abd" \
            > "$SDK_DIR/licenses/android-sdk-preview-license"

          mv "$SDK_DIR/tools/bin/sdkmanager" \
             "$SDK_DIR/tools/bin/sdkmanager.real"

          printf '%s\n' \
            '#!/usr/bin/env bash' \
            'set -e' \
            'JAVA8_HOME="${JAVA_HOME_8_X64:-/usr/lib/jvm/temurin-8-jdk-amd64}"' \
            'if [ ! -x "$JAVA8_HOME/bin/java" ]; then' \
            '  echo "Java 8 was not found: $JAVA8_HOME"' \
            '  exit 1' \
            'fi' \
            'export JAVA_HOME="$JAVA8_HOME"' \
            'export PATH="$JAVA_HOME/bin:$PATH"' \
            'exec "$(dirname "$0")/sdkmanager.real" "$@"' \
            > "$SDK_DIR/tools/bin/sdkmanager"

          chmod +x "$SDK_DIR/tools/bin/sdkmanager"

          "$SDK_DIR/tools/bin/sdkmanager" \
            --sdk_root="$SDK_DIR" \
            "platform-tools"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build debug APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-debug-apk
          path: bin/*.apk
          if-no-files-found: error