name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            build-essential \
            autoconf \
            autoconf-archive \
            automake \
            m4 \
            libtool \
            libtool-bin \
            libltdl-dev \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev \
            autopoint \
            gettext

      - name: Prepare Rust
        run: |
          rustup default stable
          rustc --version

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "buildozer==1.6.0" \
            setuptools \
            "cython==0.29.34"

      - name: Show build versions
        run: |
          python --version
          java -version
          buildozer --version

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          export ACLOCAL_PATH="/usr/share/aclocal"
          buildozer -v android debug 2>&1 | tee buildozer.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: buildozer-full-log
          path: buildozer.log
          if-no-files-found: error

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: calculator-debug-apk
          path: bin/*.apk
          if-no-files-found: error