name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17


      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip wget \
            autoconf automake libtool pkg-config \
            cmake libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev libncursesw5-dev


      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.37


      - name: Pre-accept Android SDK licenses for buildozer
        run: |
          # Buildozer downloads and manages its OWN Android SDK inside
          # ~/.buildozer/android/platform/android-sdk the first time it runs.
          # If the license files aren't there yet, sdkmanager silently skips
          # installing build-tools (which is why "aidl" ends up missing).
          # Pre-creating the accepted license files fixes that.
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          printf "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n" \
            > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf "84831b9409646a918e30573bab4c9c91346d8abd\n" \
            > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license


      - name: Build APK
        run: |
          buildozer android debug


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-apk
          path: bin/*.apk